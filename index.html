<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>iGang — Quality Shearing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e14;--card:#141720;--card2:#1c2030;--border:#252836;--border2:#2e3347;
  --amber:#f59e0b;--amberD:rgba(245,158,11,.13);--amberB:rgba(245,158,11,.3);
  --green:#4ade80;--greenD:rgba(74,222,128,.12);
  --red:#f87171;--redD:rgba(248,113,113,.12);
  --blue:#60a5fa;--blueD:rgba(96,165,250,.12);
  --purple:#a78bfa;--purpleD:rgba(167,139,250,.12);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;
  --h:'Barlow Condensed',sans-serif;
  --b:'DM Sans',sans-serif;
  --m:'JetBrains Mono',monospace;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--b);min-height:100dvh;font-size:15px;overscroll-behavior:none}
#root{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;overflow:hidden}

/* ── LAYOUT ── */
.screen{overflow-y:auto;height:calc(100dvh - 58px);padding-bottom:88px}
.topbar{
  height:58px;
  background:rgba(12,14,20,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.logo{font-family:var(--h);font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--amber);line-height:1}
.logo em{color:var(--text);font-style:normal;opacity:.45;font-weight:500}
.back-btn{
  display:flex;align-items:center;gap:6px;font-size:14px;
  color:var(--muted);cursor:pointer;background:none;border:none;padding:4px 0;flex-shrink:0;
}
.back-arr{font-size:18px;line-height:1}
.back-label{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}

/* Role Toggle */
.role-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.rt-btn{
  padding:5px 8px;font-size:10.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  cursor:pointer;border:none;background:none;color:var(--dim);transition:.15s;white-space:nowrap;
}
.rt-btn.active{background:var(--amber);color:#000}

/* FAB */
.fab{
  position:fixed;bottom:22px;right:calc(50% - 226px);
  width:52px;height:52px;border-radius:50%;background:var(--amber);
  border:none;cursor:pointer;font-size:26px;color:#000;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(245,158,11,.45);z-index:40;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(245,158,11,.3)}
@media(max-width:480px){.fab{right:18px}}

/* ── WEEK BANNER ── */
.week-banner{
  margin:14px 14px 0;padding:16px;
  background:linear-gradient(135deg,rgba(245,158,11,.13),rgba(245,158,11,.04));
  border:1px solid rgba(245,158,11,.28);border-radius:var(--r);
}
.wb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.wb-title{font-family:var(--h);font-size:12px;font-weight:700;color:var(--amber);letter-spacing:1.2px;text-transform:uppercase}
.wb-date{font-size:12px;color:var(--dim)}
.wb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.wb-stat{text-align:center;padding:8px 4px;background:rgba(0,0,0,.2);border-radius:8px}
.wb-num{font-family:var(--h);font-size:26px;font-weight:800;color:var(--text);line-height:1}
.wb-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* ── SECTION ── */
.section-lbl{
  font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--dim);
  padding:0 14px;margin:18px 0 8px;
}

/* ── JOB LIST CARD ── */
.jlc{
  margin:0 14px 8px;padding:14px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:.12s;position:relative;overflow:hidden;
}
.jlc::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--amber);opacity:0;transition:.15s;
}
.jlc:active{background:var(--card2)}
.jlc:active::before{opacity:1}
.jlc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.jlc-name{font-family:var(--h);font-size:21px;font-weight:700;line-height:1.1;flex:1;color:var(--text)}
.jlc-num{font-family:var(--m);font-size:11px;color:var(--dim);margin-top:2px}
.badge{
  display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.2px;white-space:nowrap;flex-shrink:0;
}
.b-active{background:var(--greenD);color:var(--green)}
.b-completed{background:var(--blueD);color:var(--blue)}
.b-charged{background:var(--purpleD);color:var(--purple)}
.b-dispatched{background:var(--amberD);color:var(--amber)}
.jlc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pill{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:11px;font-weight:600;background:var(--card2);color:var(--muted);
}
.jlc-prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.jlc-pct{font-family:var(--m);font-weight:600;color:var(--text)}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;border-radius:2px;transition:width .5s}
.fill-g{background:var(--green)}.fill-a{background:var(--amber)}.fill-r{background:var(--red)}.fill-b{background:var(--blue)}

/* ── JOB DETAIL ── */
.jd-hero{padding:16px 14px 10px}
.jd-farm{font-family:var(--h);font-size:30px;font-weight:800;line-height:1.1;margin-bottom:6px}
.jd-sub{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 14px;margin-bottom:2px}
.tab-btn{
  padding:10px 14px;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;background:none;border-top:none;border-left:none;border-right:none;
}
.tab-btn.on{color:var(--amber);border-bottom-color:var(--amber)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px;margin-bottom:12px}
.ic{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px}
.ic-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ic-v{font-size:14px;font-weight:600;color:var(--text)}
.ic-v.mn{font-family:var(--m);font-size:13px}
.full-ic{grid-column:span 2}
.crew-hdr{
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--h);font-size:12px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--dim);
  padding:0 14px;margin:14px 0 6px;
}
.crew-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);
}
.crew-row:last-child{border-bottom:none}
.cr-l{display:flex;align-items:center;gap:10px}
.av{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--h);font-weight:700;flex-shrink:0;
}
.cr-name{font-weight:600;font-size:14px}
.cr-role{font-size:12px;color:var(--muted)}
.car-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--amberD);color:var(--amber);font-weight:700;margin-left:6px}

/* Progress tab */
.pt{padding:0 14px}
.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.pc-lbl{font-family:var(--h);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.pc-big{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.pc-count{font-family:var(--h);font-size:40px;font-weight:800;line-height:1;color:var(--text)}
.pc-of{font-family:var(--m);font-size:12px;color:var(--muted);margin-top:3px}
.pc-pct-block{text-align:right}
.pc-pct{font-family:var(--h);font-size:36px;font-weight:800;line-height:1}
.pc-day{font-size:12px;color:var(--muted);margin-top:2px}
.pbar-lg{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:12px}
.pbar-lg-fill{height:100%;border-radius:4px;transition:width .6s}
.pace-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.pace-row:last-child{border-bottom:none}
.pace-l{color:var(--muted)}
.pace-v{font-family:var(--m);font-weight:600}
.c-g{color:var(--green)}.c-r{color:var(--red)}.c-a{color:var(--amber)}
.sr-row{
  display:flex;align-items:center;gap:8px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.sr-row:last-child{border-bottom:none}
.sr-name{font-size:13px;font-weight:600;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-bar-w{flex:1}
.sr-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sr-bar-f{height:100%;border-radius:3px;background:var(--amber);transition:width .4s}
.sr-today{font-family:var(--m);font-size:12px;font-weight:600;width:32px;text-align:right;flex-shrink:0}
.sr-tot{font-family:var(--m);font-size:11px;color:var(--dim);width:52px;text-align:right;flex-shrink:0}

/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);
  z-index:200;display:flex;flex-direction:column;justify-content:flex-end;
  animation:fadeIn .18s ease;
}
.overlay2{z-index:300}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--card);border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  max-height:88vh;display:flex;flex-direction:column;
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-title{
  font-family:var(--h);font-size:22px;font-weight:700;
  padding:10px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sheet-scroll{overflow-y:auto;flex:1}
.sheet-footer{
  border-top:1px solid var(--border);padding:12px 14px;
  display:flex;gap:8px;flex-shrink:0;
  background:var(--card);
}
.btn-p{
  flex:1;padding:13px;background:var(--amber);color:#000;
  border:none;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--b);transition:.12s;
}
.btn-p:active{opacity:.82}
.btn-p:disabled{opacity:.4;cursor:default}
.btn-g{
  padding:13px 16px;background:none;color:var(--muted);
  border:1px solid var(--border);border-radius:10px;font-size:14px;
  cursor:pointer;font-family:var(--b);white-space:nowrap;
}

/* SMS Modal items */
.sms-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:.12s;
}
.sms-row:active{background:var(--card2)}
.sms-l{display:flex;align-items:center;gap:10px}
.sms-name{font-weight:600;font-size:14px}
.sms-role{font-size:12px;color:var(--muted)}
.sms-ph{font-family:var(--m);font-size:11px;color:var(--dim);margin-top:1px}
.prev-btn{
  padding:6px 12px;border-radius:6px;
  background:var(--amberD);border:1px solid var(--amberB);
  color:var(--amber);font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;
}

/* ── JOB CARD (white) ── */
.jc-white{
  background:#fff;color:#111;border-radius:20px 20px 0 0;
  max-height:90vh;display:flex;flex-direction:column;
  animation:slideUp .22s ease;
}
.jcw-hdr{
  background:#111;color:#fff;
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-radius:20px 20px 0 0;flex-shrink:0;
}
.jcw-logo{font-family:var(--h);font-size:20px;font-weight:800;color:var(--amber)}
.jcw-sub{font-size:12px;color:#888}
.jcw-x{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:0 4px}
.jcw-body{padding:20px 16px;overflow-y:auto;flex:1}
.jcw-greet{font-size:15px;color:#444;margin-bottom:6px}
.jcw-alloc{font-size:13px;color:#666;margin-bottom:20px;line-height:1.5}
.jcw-title{
  font-family:var(--h);font-size:24px;font-weight:800;text-transform:uppercase;
  letter-spacing:-.3px;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:20px;
}
.jcw-f{margin-bottom:16px}
.jcw-fl{font-family:var(--h);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#333;margin-bottom:3px}
.jcw-fv{font-size:16px;color:#111;font-weight:500;line-height:1.4}
.map-btn{
  display:inline-flex;align-items:center;gap:6px;margin-top:7px;
  padding:8px 14px;background:#1a73e8;color:#fff;
  border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;border:none;
}
.team-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:#f4f4f4;border-radius:8px;margin-bottom:6px;
}
.ti-name{font-weight:600;font-size:14px;color:#111}
.ti-role{font-size:12px;color:#555}
.ti-car{font-size:11px;color:#1a73e8;font-weight:700;margin-top:2px}

/* ── NEW JOB FORM ── */
.ff{padding:0 14px;margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fi{
  width:100%;padding:11px 12px;background:var(--card2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--b);font-size:14px;
  outline:none;transition:.15s;
}
.fi:focus{border-color:var(--amber)}
.fi::placeholder{color:var(--dim)}
textarea.fi{resize:none;line-height:1.5}
.tog-row{display:flex;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tog-opt{
  flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;
  cursor:pointer;color:var(--muted);transition:.15s;border:none;background:none;
}
.tog-opt.on{background:var(--amber);color:#000}
.farm-list{background:var(--card2);border:1px solid var(--border);border-radius:8px;max-height:190px;overflow-y:auto}
.farm-opt{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s}
.farm-opt:last-child{border-bottom:none}
.farm-opt:active,.farm-opt.sel{background:var(--amberD)}
.fo-name{font-weight:600;font-size:14px}
.fo-addr{font-size:12px;color:var(--muted);margin-top:2px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  padding:6px 10px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;transition:.15s;
  background:var(--card2);border:1px solid var(--border);color:var(--muted);
}
.chip.sel{background:var(--amberD);border-color:var(--amberB);color:var(--amber)}

/* Sent confirmation */
.sent-state{padding:40px 20px;text-align:center}
.sent-icon{font-size:56px;margin-bottom:14px}
.sent-title{font-family:var(--h);font-size:24px;font-weight:800;color:var(--green);margin-bottom:6px}
.sent-sub{font-size:14px;color:var(--muted)}

/* Map link in overview */
.map-link{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:7px;padding:7px 12px;background:var(--blueD);
  border:1px solid rgba(96,165,250,.3);color:var(--blue);
  border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;
}

/* ── SEND BUTTON ── */
.send-bar{padding:14px}
.send-btn{
  width:100%;padding:14px;background:linear-gradient(135deg,var(--amber),#e08b00);
  color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--b);display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(245,158,11,.3);transition:.12s;
}
.send-btn:active{opacity:.85;transform:scale(.98)}

/* No tallies state */
.no-data{padding:32px 14px;text-align:center;color:var(--dim);font-size:14px}
.no-data-icon{font-size:40px;margin-bottom:8px}

/* Dispatched card hint */
.dispatch-hint{
  margin:0 14px;padding:12px 14px;
  background:var(--amberD);border:1px solid var(--amberB);border-radius:10px;
  font-size:13px;color:var(--amber);display:flex;align-items:center;gap:8px;
  margin-bottom:14px;
}
</style>
</head>

/* ═════════════ HELPERS ═════════════ */
const gf = id => FARMS.find(f=>f.id===id);
const gc = id => CREW.find(c=>c.id===id);

const AVCOLS = [
  {bg:'#78350f',fg:'#fbbf24'},{bg:'#14532d',fg:'#4ade80'},
  {bg:'#1e3a5f',fg:'#60a5fa'},{bg:'#7f1d1d',fg:'#f87171'},
  {bg:'#3b0764',fg:'#c084fc'},{bg:'#064e3b',fg:'#34d399'},
  {bg:'#7c2d12',fg:'#fb923c'},{bg:'#581c87',fg:'#e879f9'},
  {bg:'#0c4a6e',fg:'#38bdf8'},{bg:'#1a2e05',fg:'#a3e635'},
  {bg:'#431407',fg:'#fdba74'},{bg:'#1e1b4b',fg:'#818cf8'},
];
const avc = name => AVCOLS[name.charCodeAt(0)%AVCOLS.length];
const init = name => name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

function Av({name,size=34}){
  const c=avc(name);
  return e('div',{className:'av',style:{width:size,height:size,background:c.bg,color:c.fg,fontSize:size*.38+'px'}},init(name));
}

function Bdg({status}){
  const m={Active:'b-active',Completed:'b-completed','Charged Out':'b-charged',Dispatched:'b-dispatched'};
  const dots={Active:'● ',Completed:'● ',Dispatched:'◆ '};
  return e('span',{className:`badge ${m[status]||'b-active'}`},(dots[status]||'')+status);
}

function calcProg(job){
  const shIds=job.crew.filter(id=>{const c=gc(id);return c&&c.role==='Shearer';});
  let shorn=0,maxD=0;
  shIds.forEach(id=>{
    const d=job.tallies[id]||[];
    shorn+=d.reduce((a,b)=>a+b,0);
    maxD=Math.max(maxD,d.length);
  });
  const pct=job.totalSheep>0?(shorn/job.totalSheep)*100:0;
  const avgDay=maxD>0?shorn/maxD:0;
  const rem=job.totalSheep-shorn;
  const dRem=job.daysAllocated-maxD;
  const needDay=dRem>0?rem/dRem:0;
  const diff=avgDay-needDay;
  const pace=diff<-60?'behind':diff<0?'tight':'good';
  return{shorn,pct,avgDay,rem,dRem,dWorked:maxD,needDay,diff,pace,shIds};
}

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
}
function addDays(d,n){
  const dt=new Date(d+'T00:00:00');
  dt.setDate(dt.getDate()+n);
  return dt.toISOString().split('T')[0];
}
function fmtDateLong(d){
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
}

/* ═════════════ WEEK BANNER ═════════════ */
function WeekBanner({jobs}){
  const active=jobs.filter(j=>j.status==='Active');
  const allCrew=new Set(jobs.filter(j=>j.status==='Active'||j.status==='Dispatched').flatMap(j=>j.crew)).size;
  const totSheep=active.reduce((s,j)=>s+j.totalSheep,0);
  const shorn=active.reduce((s,j)=>{
    const p=calcProg(j);return s+p.shorn;
  },0);
  const rem=totSheep-shorn;
  const today=new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'short'});
  return e('div',{className:'week-banner'},
    e('div',{className:'wb-top'},
      e('div',{className:'wb-title'},'This Week'),
      e('div',{className:'wb-date'},today)
    ),

      e('div',{className:'wb-stat'},e('div',{className:'wb-num'},active.length),e('div',{className:'wb-lbl'},'Active')),
      e('div',{className:'wb-stat'},e('div',{className:'wb-num'},jobs.filter(j=>j.status==='Dispatched').length),e('div',{className:'wb-lbl'},'Dispatched')),
      e('div',{className:'wb-stat'},e('div',{className:'wb-num'},allCrew),e('div',{className:'wb-lbl'},'Crew Out')),
      e('div',{className:'wb-stat'},e('div',{className:'wb-num'},rem>0?rem.toLocaleString():'✓'),e('div',{className:'wb-lbl'},'Sheep Left'))
    )
  );
}

/* ═════════════ PROGRESS TAB ═════════════ */
function ProgressTab({job}){
  const p=calcProg(job);
  if(p.dWorked===0)return e('div',{className:'no-data'},
    e('div',{className:'no-data-icon'},'📊'),
    e('div',null,'No tallies entered yet'),
    e('div',{style:{fontSize:'12px',marginTop:'6px'}},'Shed lead enters counts each run break')
  );
  const fillCls=p.pace==='behind'?'fill-r':p.pace==='tight'?'fill-a':'fill-g';
  const pceCls=p.pace==='behind'?'c-r':p.pace==='tight'?'c-a':'c-g';
  const pceLabel=p.pace==='behind'
    ?`⚠ Behind — ${Math.abs(Math.round(p.diff))}/day short`
    :p.pace==='tight'
    ?`△ Tight — ${Math.abs(Math.round(p.diff))}/day short`
    :`✓ On track`;
  const projDays=p.avgDay>0?p.rem/p.avgDay:0;
  const projLabel=projDays<=p.dRem?`Finish Day ${p.dWorked+Math.ceil(projDays)} ✓`
    :`${Math.ceil(projDays-p.dRem)} day(s) over budget`;
  const maxToday=Math.max(...p.shIds.map(id=>{const d=job.tallies[id]||[];return d[d.length-1]||0;}),1);
  return e('div',{className:'pt'},
    e('div',{className:'pc'},
      e('div',{className:'pc-lbl'},'Completion'),
      e('div',{className:'pc-big'},
        e('div',null,
          e('div',{className:'pc-count'},p.shorn.toLocaleString()),
          e('div',{className:'pc-of'},'of '+job.totalSheep.toLocaleString()+' sheep')
        ),
        e('div',{className:'pc-pct-block'},
          e('div',{className:'pc-pct',style:{color:'var(--'+( p.pace==='good'?'green':p.pace==='tight'?'amber':'red')+')'}},Math.round(p.pct)+'%'),
          e('div',{className:'pc-day'},'Day '+p.dWorked+' of '+job.daysAllocated)
        )
      ),
      e('div',{className:'pbar-lg'},e('div',{className:`pbar-lg-fill ${fillCls}`,style:{width:Math.min(p.pct,100)+'%'}})),
      e('div',{className:'pace-row'},e('span',{className:'pace-l'},'Status'),e('span',{className:`pace-v ${pceCls}`},pceLabel)),
      e('div',{className:'pace-row'},e('span',{className:'pace-l'},'Running avg'),e('span',{className:'pace-v'},Math.round(p.avgDay).toLocaleString()+'/day')),
      e('div',{className:'pace-row'},e('span',{className:'pace-l'},'Need to finish'),e('span',{className:'pace-v'},Math.round(p.needDay).toLocaleString()+'/day')),
      e('div',{className:'pace-row'},e('span',{className:'pace-l'},'Projection'),e('span',{className:`pace-v ${p.avgDay>0&&p.rem/p.avgDay<=p.dRem?'c-g':'c-a'}`},projLabel)),
      e('div',{className:'pace-row'},e('span',{className:'pace-l'},'Remaining'),e('span',{className:'pace-v'},p.rem.toLocaleString()+' sheep, '+p.dRem+' day'+(p.dRem!==1?'s':'')+' left'))
    ),
    p.shIds.length>0&&e('div',{className:'pc'},
      e('div',{className:'pc-lbl'},'Today — Day '+p.dWorked),
      p.shIds.map(id=>{
        const c=gc(id);if(!c)return null;
        const days=job.tallies[id]||[];
        const today=days[days.length-1]||0;
        const total=days.reduce((a,b)=>a+b,0);
        const fn=c.name.split(' ')[0]+' '+c.name.split(' ').slice(-1)[0][0]+'.';
        return e('div',{key:id,className:'sr-row'},
          e('div',{className:'sr-name'},fn),

          e('div',{className:'sr-today'},today),

        );
      })
    )
  );
}

  };
  const FF=({label,children})=>e('div',{className:'ff'},e('div',{className:'fl'},label),children);
  return e('div',{className:'overlay',onClick:ev=>{if(ev.target.className==='overlay')onClose()}},
    e('div',{className:'sheet'},
      e('div',{className:'sheet-handle'}),
      e('div',{className:'sheet-title'},'New Job'),
      e('div',{className:'sheet-scroll'},
        e(FF,{label:'Job Type'},
          e('div',{className:'tog-row'},
            ['Shearing','Crutching'].map(t=>
              e('button',{key:t,className:`tog-opt${type===t?' on':''}`,onClick:()=>setType(t)},t)
            )
          )
        ),
        e(FF,{label:'Select Farm'},
          e('div',{className:'farm-list'},
            FARMS.map(f=>
              e('div',{key:f.id,className:`farm-opt${farmId===f.id?' sel':''}`,onClick:()=>setFarmId(f.id)},
                e('div',{className:'fo-name'},f.name),
                e('div',{className:'fo-addr'},f.address)
              )
            )
          )
        ),
        e(FF,{label:'Start Date'},
          e('input',{type:'date',className:'fi',value:startDate,onChange:ev=>setStartDate(ev.target.value)})
        ),
        e(FF,{label:'Days Allocated'},
          e('input',{type:'number',className:'fi',placeholder:'e.g. 5',value:days,onChange:ev=>setDays(ev.target.value),min:1})
        ),
        e(FF,{label:'Total Sheep'},
          e('input',{type:'number',className:'fi',placeholder:'e.g. 3000',value:sheep,onChange:ev=>setSheep(ev.target.value),min:1})
        ),
        e(FF,{label:'EVOs'},
          e('div',{className:'tog-row'},
            ['BYO','Supplied at shed'].map(opt=>
              e('button',{key:opt,className:`tog-opt${evos===opt?' on':''}`,onClick:()=>setEvos(opt)},opt)
            )
          )
        ),
        e(FF,{label:'Transport Available'},
          e('div',{className:'tog-row'},
            [['Yes',true],['No',false]].map(([l,v])=>
              e('button',{key:l,className:`tog-opt${transport===v?' on':''}`,onClick:()=>setTransport(v)},l)
            )
          )
        ),
        e(FF,{label:'Accommodation'},
          e('input',{type:'text',className:'fi',placeholder:'e.g. Shearers quarters on property',value:accomm,onChange:ev=>setAccomm(ev.target.value)})
        ),
        e(FF,{label:'Notes (breed, style, extra info)'},
          e('textarea',{className:'fi',rows:3,
            placeholder:'e.g. Merino full crt and wig. Gate code 4472.',
            value:notes,onChange:ev=>setNotes(ev.target.value)})
        ),
        e(FF,{label:`Select Crew (${selCrew.length} selected)`},
          e('div',{className:'chip-wrap'},
            CREW.map(c=>
              e('div',{key:c.id,className:`chip${selCrew.includes(c.id)?' sel':''}`,onClick:()=>togCrew(c.id)},
                c.name.split(' ')[0]+' ('+c.role.split(' ').map(w=>w[0]).join('')+')'
              )
            )
          )
        ),
        e('div',{style:{height:'8px'}})
      ),
      e('div',{className:'sheet-footer'},
        e('button',{className:'btn-g',onClick:onClose},'Cancel'),
        e('button',{className:'btn-p',disabled:!canCreate,onClick:doCreate,style:{opacity:canCreate?1:.4}},
          canCreate?`Create + Dispatch Job`:'Fill in required fields'
        )
      )
    )
  );
}

/* ═════════════ APP ═════════════ */
function App(){
  const [role,setRole]=useState('admin');
  const [screen,setScreen]=useState('home');
  const [selJobId,setSelJobId]=useState(null);
  const [jobs,setJobs]=useState(INIT_JOBS);
  const [showSMS,setShowSMS]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [previewId,setPreviewId]=useState(null);

  const selJob=jobs.find(j=>j.id===selJobId);

  const goJob=id=>{setSelJobId(id);setScreen('job');};
  const goHome=()=>{setScreen('home');setSelJobId(null);setShowSMS(false);setPreviewId(null);};

  const doCreate=job=>{
    setJobs(p=>[job,...p]);
    setShowNew(false);
    setSelJobId(job.id);
    setScreen('job');
    setTimeout(()=>setShowSMS(true),350);
  };

  return e('div',null,
    screen==='home'&&e(HomeScreen,{jobs,role,setRole,onJob:goJob,onNew:()=>setShowNew(true)}),
    screen==='job'&&selJob&&e(JobDetailScreen,{job:selJob,role,setRole,onBack:goHome,onSend:()=>setShowSMS(true)}),
    showSMS&&selJob&&e(SMSModal,{job:selJob,onClose:()=>{setShowSMS(false);setPreviewId(null);},onPreview:id=>setPreviewId(id)}),
    previewId&&selJob&&e(JobCardView,{job:selJob,crewId:previewId,onClose:()=>setPreviewId(null)}),
    showNew&&e(NewJobModal,{onClose:()=>setShowNew(false),onCreate:doCreate})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
